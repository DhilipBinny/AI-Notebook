# AI Notebook Platform - All Services
#
# This docker-compose runs everything: nginx, frontend, backend, and infrastructure.
# The playground image is built separately and containers are spawned dynamically.
#
# Usage:
#   # First, build the playground image
#   docker build -t ainotebook-playground:latest ./playground
#
#   # Then start all services
#   docker-compose -f docker-compose.apps.yml up -d
#
# Access:
#   http://localhost:8001 (via nginx - main entry point)
#   http://localhost:3000 (direct frontend, dev only)

services:
  # ===========================================
  # Nginx Reverse Proxy
  # ===========================================
  nginx:
    image: nginx:alpine
    container_name: ainotebook-nginx
    restart: unless-stopped
    ports:
      - "8001:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    networks:
      - ainotebook-network
    depends_on:
      - web
      - master-api
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1/nginx-health"]
      interval: 10s
      timeout: 5s
      retries: 3

  # ===========================================
  # Master API (FastAPI Backend)
  # ===========================================
  master-api:
    build:
      context: ./master
      dockerfile: Dockerfile
    container_name: ainotebook-master-api
    restart: unless-stopped
    # API accessed via nginx, no direct port exposure needed
    # ports:
    #   - "8001:8001"
    environment:
      # Application
      APP_ENV: development
      APP_DEBUG: "true"
      # Database (use container name for Docker networking)
      DATABASE_URL: mysql+aiomysql://root:ainotebook_dev_password@ainotebook-mysql:3306/ainotebook
      # Redis
      REDIS_URL: redis://ainotebook-redis:6379/0
      # S3/MinIO
      S3_ENDPOINT: http://ainotebook-minio:9000
      S3_ACCESS_KEY: minioadmin
      S3_SECRET_KEY: minioadmin123
      S3_BUCKET_NOTEBOOKS: notebooks
      # JWT
      JWT_SECRET: dev_secret_key_change_in_production_32chars_min
      JWT_ALGORITHM: HS256
      JWT_ACCESS_TOKEN_EXPIRE_MINUTES: "30"
      JWT_REFRESH_TOKEN_EXPIRE_DAYS: "7"
      # CORS
      CORS_ORIGINS: http://localhost,http://localhost:3000,http://localhost:8001
      # LLM API Keys - mount the .env file from playground/backend into containers
      LLM_ENV_FILE: /host/playground/backend/.env
      # Playground
      PLAYGROUND_IMAGE: ainotebook-playground:latest
      PLAYGROUND_NETWORK: ainotebook-network
      PLAYGROUND_MEMORY_LIMIT: 2g
      PLAYGROUND_CPU_LIMIT: "1.0"
      PLAYGROUND_IDLE_TIMEOUT: "3600"
    volumes:
      # Mount Docker socket for container management
      - /var/run/docker.sock:/var/run/docker.sock
      # Mount source for hot reload in development
      - ./master/app:/app/app:ro
      # Mount project root so we can access playground/.env for LLM keys
      - .:/host:ro
    networks:
      - ainotebook-network
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ===========================================
  # Web Frontend (Next.js)
  # ===========================================
  web:
    build:
      context: ./web
      dockerfile: Dockerfile
    container_name: ainotebook-web
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      # API URL (for client-side calls via nginx)
      NEXT_PUBLIC_API_URL: http://localhost
      # Node environment
      NODE_ENV: development
    volumes:
      # Mount source for hot reload in development
      - ./web/src:/app/src:ro
      - ./web/public:/app/public:ro
    networks:
      - ainotebook-network
    depends_on:
      - master-api

  # ===========================================
  # Infrastructure Services
  # ===========================================
  mysql:
    image: mysql:8.0
    container_name: ainotebook-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ainotebook_dev_password
      MYSQL_DATABASE: ainotebook
      MYSQL_CHARACTER_SET_SERVER: utf8mb4
      MYSQL_COLLATION_SERVER: utf8mb4_unicode_ci
    ports:
      - "3307:3306"
    volumes:
      - ./infrastructure/data/mysql:/var/lib/mysql
      - ./scripts/init-db.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    networks:
      - ainotebook-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-painotebook_dev_password"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  redis:
    image: redis:7-alpine
    container_name: ainotebook-redis
    restart: unless-stopped
    ports:
      - "6380:6379"
    volumes:
      - ./infrastructure/data/redis:/data
    networks:
      - ainotebook-network
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: ainotebook-minio
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin123
    ports:
      - "9002:9000"
      - "9003:9001"
    volumes:
      - ./infrastructure/data/minio:/data
    networks:
      - ainotebook-network
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  minio-init:
    image: minio/mc:latest
    container_name: ainotebook-minio-init
    depends_on:
      minio:
        condition: service_healthy
    networks:
      - ainotebook-network
    entrypoint: >
      /bin/sh -c "
      mc alias set myminio http://minio:9000 minioadmin minioadmin123;
      mc mb myminio/notebooks --ignore-existing;
      mc mb myminio/outputs --ignore-existing;
      mc mb myminio/avatars --ignore-existing;
      mc anonymous set download myminio/avatars;
      echo 'Buckets created successfully';
      exit 0;
      "

# ===========================================
# Networks
# ===========================================
networks:
  ainotebook-network:
    driver: bridge
    name: ainotebook-network
