# AI Notebook Platform - Application Services
#
# Nginx, Master API (FastAPI), and Web Frontend (Next.js).
# Requires infrastructure to be running first (docker-compose.infra.yml).
#
# Usage:
#   # Build playground image first
#   docker build -t ainotebook-playground:latest ./playground
#
#   # Start infrastructure
#   docker-compose -f docker-compose.infra.yml up -d
#
#   # Then start application services
#   docker-compose -f docker-compose.apps.yml up -d
#
# Access:
#   http://localhost:8001 (via nginx - main entry point)
#   http://localhost:3000 (direct frontend, dev only)

services:
  # ===========================================
  # Nginx Reverse Proxy
  # ===========================================
  nginx:
    image: nginx:alpine
    container_name: ainotebook-nginx
    restart: unless-stopped
    ports:
      - "8001:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    networks:
      - ainotebook-network
    depends_on:
      - web
      - master-api
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1/nginx-health"]
      interval: 10s
      timeout: 5s
      retries: 3

  # ===========================================
  # Master API (FastAPI Backend)
  # ===========================================
  master-api:
    build:
      context: ./master
      dockerfile: Dockerfile
    container_name: ainotebook-master-api
    restart: unless-stopped
    environment:
      # Application
      APP_ENV: ${APP_ENV:-development}
      APP_DEBUG: ${APP_DEBUG:-true}
      # Database
      DATABASE_URL: ${DATABASE_URL:-mysql+aiomysql://root:ainotebook_dev_password@ainotebook-mysql:3306/ainotebook}
      # S3/MinIO
      S3_ENDPOINT: ${S3_ENDPOINT:-http://ainotebook-minio:9000}
      S3_ACCESS_KEY: ${S3_ACCESS_KEY:-minioadmin}
      S3_SECRET_KEY: ${S3_SECRET_KEY:-minioadmin123}
      S3_BUCKET_NOTEBOOKS: ${S3_BUCKET_NOTEBOOKS:-notebooks}
      # JWT
      JWT_SECRET: ${JWT_SECRET:-dev_secret_key_change_in_production_32chars_min}
      JWT_ALGORITHM: ${JWT_ALGORITHM:-HS256}
      JWT_ACCESS_TOKEN_EXPIRE_MINUTES: ${JWT_ACCESS_TOKEN_EXPIRE_MINUTES:-30}
      JWT_REFRESH_TOKEN_EXPIRE_DAYS: ${JWT_REFRESH_TOKEN_EXPIRE_DAYS:-7}
      # Google OAuth
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      OAUTH_REDIRECT_BASE_URL: ${OAUTH_REDIRECT_BASE_URL:-http://localhost:8001}
      # CORS
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost,http://localhost:3000,http://localhost:8001}
      # Encryption (for DB-stored API keys)
      ENCRYPTION_KEY: ${ENCRYPTION_KEY:-}
      # Playground
      PLAYGROUND_IMAGE: ${PLAYGROUND_IMAGE:-ainotebook-playground:latest}
      PLAYGROUND_NETWORK: ${PLAYGROUND_NETWORK:-ainotebook-network}
      PLAYGROUND_MEMORY_LIMIT: ${PLAYGROUND_MEMORY_LIMIT:-2g}
      PLAYGROUND_CPU_LIMIT: ${PLAYGROUND_CPU_LIMIT:-1.0}
      PLAYGROUND_IDLE_TIMEOUT: ${PLAYGROUND_IDLE_TIMEOUT:-3600}
      # AI Cell Streaming
      AI_CELL_STREAMING_ENABLED: ${AI_CELL_STREAMING_ENABLED:-true}
      # User Limits
      DEFAULT_MAX_PROJECTS: ${DEFAULT_MAX_PROJECTS:-5}
    volumes:
      # Mount Docker socket for container management
      - /var/run/docker.sock:/var/run/docker.sock
      # Mount source for hot reload in development
      - ./master/app:/app/app:ro
    networks:
      - ainotebook-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ===========================================
  # Web Frontend (Next.js)
  # ===========================================
  web:
    build:
      context: ./web
      dockerfile: Dockerfile
    container_name: ainotebook-web
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost
      NODE_ENV: development
    volumes:
      - ./web/src:/app/src:ro
      - ./web/public:/app/public:ro
    networks:
      - ainotebook-network
    depends_on:
      - master-api
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1:3000"]
      interval: 10s
      timeout: 5s
      retries: 3

# ===========================================
# Networks (must match docker-compose.infra.yml)
# ===========================================
networks:
  ainotebook-network:
    external: true
    name: ainotebook-network
