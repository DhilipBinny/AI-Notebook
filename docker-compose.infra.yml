# AI Notebook Platform - Infrastructure Services
#
# MySQL, MinIO (S3), and shared network.
# Start infrastructure before application services.
#
# Usage:
#   docker-compose -f docker-compose.infra.yml up -d
#
# Then start apps:
#   docker-compose -f docker-compose.apps.yml up -d

services:
  # ===========================================
  # MySQL Database
  # ===========================================
  mysql:
    image: mysql:8.0
    container_name: ainotebook-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-ainotebook_dev_password}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-ainotebook}
      MYSQL_CHARACTER_SET_SERVER: utf8mb4
      MYSQL_COLLATION_SERVER: utf8mb4_unicode_ci
    ports:
      - "3307:3306"
    volumes:
      - ./infrastructure/data/mysql:/var/lib/mysql
      - ./scripts/init-db.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    networks:
      - ainotebook-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD:-ainotebook_dev_password}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ===========================================
  # MinIO (S3-compatible Object Storage)
  # ===========================================
  minio:
    image: minio/minio:latest
    container_name: ainotebook-minio
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_KEY:-minioadmin123}
    ports:
      - "9002:9000"
      - "9003:9001"
    volumes:
      - ./infrastructure/data/minio:/data
    networks:
      - ainotebook-network
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ===========================================
  # MinIO Bucket Initialization (run-once)
  # ===========================================
  minio-init:
    image: minio/mc:latest
    container_name: ainotebook-minio-init
    depends_on:
      minio:
        condition: service_healthy
    networks:
      - ainotebook-network
    entrypoint: >
      /bin/sh -c "
      mc alias set myminio http://minio:9000 ${S3_ACCESS_KEY:-minioadmin} ${S3_SECRET_KEY:-minioadmin123};
      mc mb myminio/notebooks --ignore-existing;
      mc mb myminio/outputs --ignore-existing;
      mc mb myminio/avatars --ignore-existing;
      mc anonymous set download myminio/avatars;
      echo 'Buckets created successfully';
      exit 0;
      "

# ===========================================
# Networks
# ===========================================
networks:
  ainotebook-network:
    driver: bridge
    name: ainotebook-network
